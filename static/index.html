<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joaquin@portfolio:~$ mike-agent</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --surface: #1e212b;
            --border: #2b2f3e;
            --text: #a6accd;
            --text-dim: #717cb4;
            --cyan: #80cbc4;
            --green: #c3e88d;
            --yellow: #ffcb6b;
            --red: #f07178;
            --purple: #c792ea;
            --mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e212b 0%, #0f111a 70%);
        }

        .terminal {
            width: 100%;
            max-width: 850px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(15, 17, 26, 0.95);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            padding: 12px 16px;
            background: #1a1c23;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .title { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.5px; }

        .toolbar {
            padding: 8px 16px;
            background: transparent;
            border-bottom: 1px dashed var(--border);
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-toolbar, .upload-label, .select-model {
            background: rgba(128, 203, 196, 0.08); 
            color: var(--cyan);
            border: 1px solid var(--border);
            padding: 6px 12px; 
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            transition: all 0.2s; 
        }
        .btn-toolbar:hover, .upload-label:hover {
            border-color: var(--cyan);
            background: rgba(128, 203, 196, 0.1);
        }
        
        input[type="file"] { display: none; }
        .select-model option { background: var(--surface); color: var(--text); }
        .upload-status { color: var(--text-dim); flex: 1; text-align: right; min-width: fit-content; align-self: center; }

        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    
        .msg-line { display: flex; align-items: flex-start; gap: 10px; word-break: break-word; }
        .prompt-prefix { white-space: nowrap; flex-shrink: 0; }
        .prompt-prefix.user { color: var(--green); }
        .prompt-prefix.bot { color: var(--yellow); }
        .prompt-symbol { color: var(--text-dim); margin-right: 4px; }

        .msg-content { color: var(--text); white-space: pre-wrap; flex: 1; }
        .msg-content.bot-text { color: #e4e4e4; }


        .input-area {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border);
            gap: 10px;
        }

        .input-wrapper { flex: 1; display: flex; align-items: center; }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            caret-color: var(--cyan);
        }
        
        input[type="text"]::placeholder { color: var(--border); }

        .send-icon {
            background: none; border: none; color: var(--cyan);
            font-size: 1.1rem; cursor: pointer; opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s; padding: 0 5px;
        }
        .send-icon:hover { opacity: 1; transform: scale(1.1); }

        @media (max-width: 600px) {
            .terminal { height: 90vh; border-radius: 0; }
            .prompt-prefix.user { display: none; }
            .upload-status { text-align: left; font-size: 0.65rem; margin-top: 2px; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
            <div class="title">mike-agent — bash — 80x24</div>
            <div style="width: 44px;"></div>
        </div>

        <div class="toolbar">
            <label class="upload-label" for="fileInput">Upload Doc</label>
            <input type="file" id="fileInput" accept=".pdf,.txt" onchange="subirArchivo(this)"/>
            <div style="display: flex; align-items: center; gap: 5px;">
        <span style="color: var(--text-dim); font-size: 0.7rem;">Model:</span>
        <select class="select-model" id="modelSelect">
            <option value="llama-3.1-8b-instant">Llama 8B (Fast)</option>
            <option value="llama-3.3-70b-versatile">Llama 70B (Pro)</option>
        </select>
    </div>
            <button class="btn-toolbar" onclick="resetChat()">Clear</button>
            <span class="upload-status" id="uploadStatus">[context: default.doc]</span>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <span class="prompt-prefix user">guest@portfolio</span><span class="prompt-symbol">$</span>
            <div class="input-wrapper">
                <input type="text" id="input" placeholder="Enter a command or question..." onkeypress="handleKey(event)" autocomplete="off" autofocus/>
                <button class="send-icon" onclick="enviarMensaje()">➜</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = localStorage.getItem('session_id') || '';

        window.onload = () => {
            agregarMensajeBot("Hola! Mi nombre es Mike, soy el agente virtual de Joaquín Godoy.\n\nPuedes hacerme preguntas sobre su experiencia, stack tecnológico o subir un documento nuevo para que lo analice. Estoy configurado con un Sistema RAG, por lo que solo podré responderte sobre Joaquín (o sobre el documento que me subas).\n\nSi quieres que olvide todo lo que sé, simplemente haz click en el botón 'Clear'.\n\n¿Qué te trae por aquí hoy?");
        };

        function sanitizarHTML(texto) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(texto));
            return div.innerHTML;
        }

        async function subirArchivo(input) {
            const file = input.files[0];
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            status.textContent = '[processing...]';
            const formData = new FormData();
            formData.append('file', file);
            if (sessionId) formData.append('session_id', sessionId);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                sessionId = data.session_id;
                localStorage.setItem('session_id', sessionId);
                status.textContent = `[context: ${data.archivo}]`;
                agregarMensajeBot(`>> Document indexated successfully: ${data.archivo}`);
            } catch (err) {
                status.textContent = '[error]';
                agregarMensajeBot(`>> Error: ${err.message}`);
            }
        }

        async function resetChat() {
            await fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: '', session_id: sessionId })
            });
            document.getElementById('messages').innerHTML = '';
            document.getElementById('uploadStatus').textContent = '[context: default.doc]';
            agregarMensajeBot(">> Memory cleared. Restoring default context.");
        }

        function agregarMensajeUsuario(texto) {
            const messages = document.getElementById('messages');
            messages.innerHTML += `
                <div class="msg-line">
                    <span class="prompt-prefix user">guest@portfolio</span><span class="prompt-symbol">$</span>
                    <div class="msg-content">${sanitizarHTML(texto)}</div>
                </div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        function agregarMensajeBot(texto) {
            const messages = document.getElementById('messages');
            messages.innerHTML += `
                <div class="msg-line">
                    <span class="prompt-prefix bot">mike@agent</span><span class="prompt-symbol">:~$</span>
                    <div class="msg-content bot-text">${texto.replace(/\n/g, '<br>')}</div>
                </div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        async function enviarMensaje() {
            const input = document.getElementById('input');
            const messages = document.getElementById('messages');
            const modelo = document.getElementById('modelSelect').value;
            const texto = input.value.trim();
            if (!texto) return;

            agregarMensajeUsuario(texto);
            input.value = '';

            const loadingId = 'load-' + Date.now();
            messages.innerHTML += `
                <div class="msg-line" id="${loadingId}">
                    <span class="prompt-prefix bot">mike@agent</span><span class="prompt-symbol">#</span>
                    <div class="msg-content">...</div>
                </div>`;
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: texto, modelo: modelo, session_id: sessionId })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                if (!res.ok) throw new Error(data.detail);
                sessionId = data.session_id;
                localStorage.setItem('session_id', sessionId);
                agregarMensajeBot(sanitizarHTML(data.respuesta));
            } catch (err) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                agregarMensajeBot(`>> Fatal Error: ${err.message}`);
            }
        }

        function handleKey(e) { if (e.key === 'Enter') enviarMensaje(); }
    </script>
</body>
</html>
